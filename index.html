<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUIVI REGARD</title>
  <style>
    :root { --bg: #0a0a10; --panel: #12121c; --accent: #00e87a; --text: #bbb; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; gap: 6px; padding: 8px;
    }
    h1 { color: var(--accent); font-size: 1em; letter-spacing: .5em; text-transform: uppercase; padding: 6px 0; }
    #video-wrap {
      position: relative; line-height: 0; border: 1px solid #1a1a2a;
      width: min(96vw, 104vh, 1100px); aspect-ratio: 4/3;
      background: #0a0a10; margin: 0 auto;
    }
    #videoel { display: none; }
    #overlay { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
    #video-wrap:fullscreen { width: 100vw; height: 100vh; aspect-ratio: auto; max-width: none; border: none; }
    .panel {
      background: var(--panel); border: 1px solid #1e1e30;
      border-radius: 4px; padding: 7px 12px;
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; width: 100%; max-width: 640px;
    }
    button {
      background: transparent; color: var(--accent); border: 1px solid var(--accent);
      padding: 5px 13px; cursor: pointer; font-family: monospace; font-size: .82em;
      border-radius: 3px; transition: background .12s; white-space: nowrap;
    }
    button:hover { background: rgba(0,232,122,.1); }
    button.on { background: var(--accent); color: #000; font-weight: bold; }
    label { display: flex; align-items: center; gap: 5px; font-size: .78em; color: #555; }
    label span { color: var(--text); }
    input[type=number] {
      width: 52px; background: var(--bg); color: var(--accent);
      border: 1px solid #2a2a3a; padding: 3px 4px;
      font-family: monospace; font-size: .78em; border-radius: 2px;
    }
    #status { font-size: .7em; color: #888; text-align: center; }
    body { touch-action: manipulation; user-select: none; }
  </style>
</head>
<body>
  <h1>⚡ SUIVI REGARD</h1>

  <div id="video-wrap">
    <video id="videoel" width="640" height="480"></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>

  <div class="panel">
    <button id="btn-start">▶ START</button>
    <label><span>Gain H</span>
      <input id="num-gainh" type="number" min="1" max="50" step="1" value="10">
    </label>
    <button id="btn-ctr" title="Regarde droit devant puis clique pour centrer">◎ Centrer</button>
    <label style="display:flex;align-items:center;gap:4px">
      <input id="chk-dbg" type="checkbox"><span>Debug</span>
    </label>
    <button id="btn-fs">⛶ Plein écran</button>
  </div>

  <div id="status">Chargement MediaPipe…</div>

<script type="module">
(async () => {

// ── STATE ─────────────────────────────────────────────────────────────────────
let running  = false;
let lastGaze = { h: 0, v: 0 };
let centerH  = 0;
let gainH    = 10;
let showDbg  = false;
let faceBB   = { cx: 0.5, cy: 0.5, hw: 0.30 };
let lastCrop = { sx: 0, sy: 0, sw: 1, sh: 1 };
let lastT    = -1;
let animFrame = null;
let currentStream = null;
let cursorFx = 0.5; // position horizontale courante du curseur (0–1)

document.getElementById('chk-dbg').addEventListener('change', e => { showDbg = e.target.checked; });
const numGainH = document.getElementById('num-gainh');
numGainH.addEventListener('change', () => {
  gainH = Math.max(0.5, parseFloat(numGainH.value) || 10);
  numGainH.value = gainH;
});

// ── CANVAS ────────────────────────────────────────────────────────────────────
const video   = document.getElementById('videoel');
const overlay = document.getElementById('overlay');
const ctx2d   = overlay.getContext('2d');

// ── MEDIAPIPE ─────────────────────────────────────────────────────────────────
const vision = await import(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs'
);
const { FaceLandmarker, FilesetResolver } = vision;
const fs = await FilesetResolver.forVisionTasks(
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm'
);
const hl = await FaceLandmarker.createFromOptions(fs, {
  baseOptions: {
    modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
    delegate: 'GPU'
  },
  runningMode: 'VIDEO',
  numFaces: 1,
  outputFaceBlendshapes: false
});

document.getElementById('status').textContent =
  'Prêt — ▶ START puis ◎ Centrer en regardant droit devant';

// ── REGARD : repère 3D visage + détection iris par pixels ────────────────────
// 1. Repère 3D (r/u/f) depuis landmarks stables → compensation pose de tête
// 2. Crop zoomé centré sur le landmark iris MediaPipe → voisinage étroit
// 3. Centroïde des pixels sombres → position iris à la précision pixel
// 4. Projection du décalage iris-orbite sur (r, u) → h indépendant de la pose

const eyeCnv = document.createElement('canvas');
eyeCnv.width = 120; eyeCnv.height = 50;
const eyeCtxOff = eyeCnv.getContext('2d', { willReadFrequently: true });

let dbgH = 0, dbgV = 0;
let dbgIris1 = null, dbgIris2 = null;

function irisPixel(lm, c1, c2, irisIdx) {
  const vW = video.videoWidth || 640, vH = video.videoHeight || 480;
  const eyeW = Math.abs(lm[c1].x - lm[c2].x) * vW;
  if (eyeW < 4) return null;

  const r   = eyeW * 0.40;
  const iCx = lm[irisIdx].x * vW;
  const iCy = lm[irisIdx].y * vH;
  const bx  = Math.max(0, iCx - r),     by = Math.max(0, iCy - r * 0.85);
  const bw  = Math.min(vW - bx, r * 2), bh = Math.min(vH - by, r * 1.7);
  if (bw < 4 || bh < 4) return null;

  try { eyeCtxOff.drawImage(video, bx, by, bw, bh, 0, 0, 120, 50); }
  catch { return null; }
  const d = eyeCtxOff.getImageData(0, 0, 120, 50).data;

  let minLum = 255;
  for (let i = 0; i < d.length; i += 4)
    minLum = Math.min(minLum, 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
  if (minLum > 160) return null;
  const thr = Math.min(130, minLum + 55);

  let sx = 0, sy = 0, tot = 0;
  for (let y = 2; y < 48; y++) {
    for (let x = 2; x < 118; x++) {
      const i = (y * 120 + x) * 4;
      const lum = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
      const w = Math.max(0, thr - lum) ** 2;
      sx += x * w; sy += y * w; tot += w;
    }
  }
  if (tot < 10) return null;
  return {
    x: (bx + (sx/tot/120) * bw) / vW,
    y: (by + (sy/tot/50)  * bh) / vH,
    z: lm[irisIdx].z
  };
}

function gazeFromLandmarks(lm) {
  if (!lm || lm.length < 478) return null;

  const asp = (video.videoHeight && video.videoWidth)
    ? video.videoHeight / video.videoWidth : 0.75;
  const P  = i => ({ x: lm[i].x, y: lm[i].y * asp, z: lm[i].z });

  const sub   = (a, b) => ({ x:a.x-b.x, y:a.y-b.y, z:a.z-b.z });
  const mid   = (a, b) => ({ x:(a.x+b.x)/2, y:(a.y+b.y)/2, z:(a.z+b.z)/2 });
  const dot   = (a, b) => a.x*b.x + a.y*b.y + a.z*b.z;
  const cross = (a, b) => ({ x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x });
  const len   = a => Math.hypot(a.x, a.y, a.z) || 1e-6;
  const norm  = a => { const l = len(a); return { x:a.x/l, y:a.y/l, z:a.z/l }; };

  let r = sub(P(263), P(33));
  const vDown = sub(P(152), P(168));
  let f = cross(r, vDown);
  let u = cross(f, r);
  r = norm(r); u = norm(u); f = norm(f);
  if (r.x < 0) { r.x*=-1; r.y*=-1; r.z*=-1; }
  if (u.y < 0) { u.x*=-1; u.y*=-1; u.z*=-1; }

  const earW1 = Math.abs(lm[133].x - lm[33].x),  earW2 = Math.abs(lm[263].x - lm[362].x);
  const earH1 = Math.abs(lm[159].y - lm[145].y),  earH2 = Math.abs(lm[386].y - lm[374].y);
  if (earW1 < 0.005 || earW2 < 0.005) return null;
  if (earH1/earW1 < 0.04 && earH2/earW2 < 0.04) return null;
  const eW1 = len(sub(P(133), P(33))),  eW2 = len(sub(P(263), P(362)));

  const iris1 = irisPixel(lm, 33,  133, 468) ?? { x: lm[468].x, y: lm[468].y, z: lm[468].z };
  const iris2 = irisPixel(lm, 362, 263, 473) ?? { x: lm[473].x, y: lm[473].y, z: lm[473].z };

  const I1 = { x: iris1.x, y: iris1.y * asp, z: iris1.z };
  const I2 = { x: iris2.x, y: iris2.y * asp, z: iris2.z };

  const o1 = sub(I1, mid(P(33),  P(133)));
  const o2 = sub(I2, mid(P(362), P(263)));
  const h  = (dot(o1, r)/eW1 + dot(o2, r)/eW2) / 2;
  const v  = (dot(o1, u)/eW1 + dot(o2, u)/eW2) / 2;

  dbgH = h; dbgV = v;
  dbgIris1 = iris1; dbgIris2 = iris2;
  return { h, v };
}

// ── RENDU ─────────────────────────────────────────────────────────────────────
function drawFrame(res) {
  const W = overlay.width, H = overlay.height;
  const k = Math.min(W, H) / 480;

  ctx2d.clearRect(0, 0, W, H);

  // Zoom centré sur le milieu des yeux
  if (res.faceLandmarks?.length) {
    const lmZ = res.faceLandmarks[0];
    const tcx = (lmZ[133].x + lmZ[362].x) / 2;
    const tcy = (lmZ[133].y + lmZ[362].y) / 2;
    const thw = Math.abs(lmZ[263].x - lmZ[33].x) / 2 * 1.2;
    faceBB.cx += (tcx - faceBB.cx) * 0.08;
    faceBB.cy += (tcy - faceBB.cy) * 0.08;
    faceBB.hw += (thw - faceBB.hw) * 0.08;
  }

  // Fond caméra zoomé
  if (video.readyState >= 2) {
    const vW = video.videoWidth || 640, vH = video.videoHeight || 480;
    const hw = faceBB.hw;
    const hh = hw * (vW / vH) * (H / W);
    const x0 = Math.max(0, faceBB.cx - hw), x1 = Math.min(1, faceBB.cx + hw);
    const y0 = Math.max(0, faceBB.cy - hh), y1 = Math.min(1, faceBB.cy + hh);
    lastCrop = { sx: x0, sy: y0, sw: x1 - x0, sh: y1 - y0 };
    ctx2d.drawImage(video, x0*vW, y0*vH, (x1-x0)*vW, (y1-y0)*vH, 0, 0, W, H);
  }

  // Calcul du regard → position horizontale du curseur
  if (res.faceLandmarks?.length) {
    const gaze = gazeFromLandmarks(res.faceLandmarks[0]);
    if (gaze) {
      lastGaze.h += (gaze.h - lastGaze.h) * 0.15;
      cursorFx = Math.max(0, Math.min(1, 0.5 - (lastGaze.h - centerH) * gainH));
    }
  }

  // Ligne horizontale centrale
  const lineY = H / 2;
  const lineR = Math.round(8 * k);  // rayon du "rail" demi-arrondi aux extrémités
  ctx2d.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx2d.lineWidth = Math.max(2, 2 * k);
  ctx2d.beginPath();
  ctx2d.moveTo(lineR, lineY);
  ctx2d.lineTo(W - lineR, lineY);
  ctx2d.stroke();
  // Marqueurs extrémités
  for (const ex of [lineR, W - lineR]) {
    ctx2d.beginPath(); ctx2d.arc(ex, lineY, lineR * 0.5, 0, Math.PI * 2);
    ctx2d.fillStyle = 'rgba(255,255,255,0.2)'; ctx2d.fill();
  }

  // Point curseur sur la ligne
  const cx = cursorFx * W;
  const dotR = Math.round(12 * k);
  ctx2d.beginPath(); ctx2d.arc(cx, lineY, dotR, 0, Math.PI * 2);
  ctx2d.fillStyle = 'rgba(0,232,122,0.95)'; ctx2d.fill();
  ctx2d.lineWidth = Math.max(1.5, 2 * k);
  ctx2d.strokeStyle = 'rgba(0,0,0,0.5)'; ctx2d.stroke();

  // Cadre
  ctx2d.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx2d.lineWidth = Math.max(1, k);
  ctx2d.strokeRect(1, 1, W - 2, H - 2);

  // Debug
  if (showDbg) {
    for (const ir of [dbgIris1, dbgIris2]) {
      if (!ir) continue;
      const ix = (ir.x - lastCrop.sx) / lastCrop.sw * W;
      const iy = (ir.y - lastCrop.sy) / lastCrop.sh * H;
      const r2 = 8 * k;
      ctx2d.strokeStyle = '#ff2222'; ctx2d.lineWidth = 2 * k;
      ctx2d.beginPath(); ctx2d.moveTo(ix-r2,iy); ctx2d.lineTo(ix+r2,iy); ctx2d.stroke();
      ctx2d.beginPath(); ctx2d.moveTo(ix,iy-r2); ctx2d.lineTo(ix,iy+r2); ctx2d.stroke();
      ctx2d.beginPath(); ctx2d.arc(ix, iy, r2*0.6, 0, Math.PI*2);
      ctx2d.strokeStyle = 'rgba(255,255,0,0.9)'; ctx2d.stroke();
    }
    ctx2d.font = `${Math.round(11*k)}px monospace`;
    ctx2d.textAlign = 'left'; ctx2d.textBaseline = 'top';
    ctx2d.fillStyle = 'rgba(0,255,130,0.95)';
    ctx2d.fillText(`h ${dbgH.toFixed(3)}`, 8*k, 8*k);
    ctx2d.fillText(`centre h ${centerH.toFixed(3)}`, 8*k, 22*k);
    ctx2d.fillText(`iris ${dbgIris1 ? 'G✓' : 'G✗'}  ${dbgIris2 ? 'D✓' : 'D✗'}`, 8*k, 36*k);
    ctx2d.textAlign = 'start'; ctx2d.textBaseline = 'alphabetic';
  }
}

function frameLoop() {
  if (!running) return;
  if (video.readyState >= 2 && video.currentTime !== lastT) {
    lastT = video.currentTime;
    drawFrame(hl.detectForVideo(video, performance.now()));
  }
  animFrame = requestAnimationFrame(frameLoop);
}

// ── CAMÉRA ────────────────────────────────────────────────────────────────────
async function startCamera() {
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  video.srcObject = currentStream;
  await video.play();
}

// ── START / STOP ──────────────────────────────────────────────────────────────
const btnStart = document.getElementById('btn-start');
btnStart.addEventListener('click', async () => {
  if (!running) {
    await startCamera();
    running = true; lastT = -1;
    frameLoop();
    btnStart.textContent = '⏹ STOP'; btnStart.classList.add('on');
    document.getElementById('status').textContent =
      'Actif — regarde droit devant et clique ◎ Centrer';
  } else {
    running = false;
    cancelAnimationFrame(animFrame); animFrame = null;
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    video.srcObject = null;
    btnStart.textContent = '▶ START'; btnStart.classList.remove('on');
    ctx2d.clearRect(0, 0, overlay.width, overlay.height);
    document.getElementById('status').textContent = 'Arrêté';
  }
});

// ── CENTRER ───────────────────────────────────────────────────────────────────
document.getElementById('btn-ctr').addEventListener('click', () => {
  centerH = lastGaze.h;
  document.getElementById('status').textContent =
    `Centré ✓  (h=${centerH.toFixed(3)})`;
});

// ── REDIMENSIONNEMENT / PLEIN ÉCRAN ───────────────────────────────────────────
const videoWrap = document.getElementById('video-wrap');
function resizeCanvas() {
  const r = overlay.getBoundingClientRect();
  const w = Math.max(1, Math.round(r.width)), h = Math.max(1, Math.round(r.height));
  if (overlay.width !== w || overlay.height !== h) { overlay.width = w; overlay.height = h; }
}
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

const btnFs = document.getElementById('btn-fs');
btnFs.addEventListener('click', async () => {
  try {
    if (!document.fullscreenElement)
      await (videoWrap.requestFullscreen?.() ?? videoWrap.webkitRequestFullscreen?.());
    else
      await (document.exitFullscreen?.() ?? document.webkitExitFullscreen?.());
  } catch(_) {}
});
document.addEventListener('fullscreenchange', () => {
  const fs = !!document.fullscreenElement;
  btnFs.classList.toggle('on', fs);
  btnFs.textContent = fs ? '⛶ Quitter' : '⛶ Plein écran';
  requestAnimationFrame(resizeCanvas);
});

})();
</script>
</body>
</html>
